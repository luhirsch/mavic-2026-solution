# config.example.yaml
# Copy this file to config.yaml and fill in your paths before running.


paths:
  # DINOv3 - download weights and clone repo from: <link here>
  dino_weights: "/path/to/dinov3_vits16plus_pretrain.pth"
  dino_repo: "/path/to/dinov3"

  # MAVIC-C 2025 dataset - place in ./data or update paths below
  # val_data should point to the output of organize_mavic_val_into_folders.py
  train_sar: "./data/train/SAR_Train"
  train_eo: "./data/train/EO_Train"
  val: "./data/val"
  val_data_reference: "./data/validation_reference.csv"
  val_organized: "./data/val_organized"
  test: "./data/test"


